name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bats + jq (macos)
        run: brew install bats-core jq

      - name: Run test suite
        run: bash tests/run.sh

      - name: Run deep suite
        run: HARNISH_RUN_DEEP_TESTS=1 bash tests/run.sh
        if: success()
